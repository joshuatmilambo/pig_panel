<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        margin: 0;
        padding: 12px;
        width: 220px;
        background: #f9fafb;
        color: #111827;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding-bottom: 8px;
        margin-bottom: 12px;
        border-bottom: 1px solid #e5e7eb;
      }

      .header img {
        width: 16px;
        height: 16px;
      }

      .header h1 {
        font-size: 14px;
        font-weight: 600;
        margin: 0;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 13px;
      }

      input[type="checkbox"] {
        width: 36px;
        height: 18px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <img src="../images/pig_16.png" alt="Pig icon" />
      <h1>Pig Panel</h1>
    </div>

    <div class="toggle-row">
      <span>Dark Mode</span>
      <input type="checkbox" id="darkModeToggle" />
    </div>

    <script src="popup.js"></script>
  </body>
</html>
